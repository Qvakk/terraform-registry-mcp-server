version: '3.8'

services:
  terraform-mcp-server:
    build: .
    container_name: terraform-mcp-server
    ports:
      - "3002:3002"
    environment:
      - TRANSPORT_MODE=http
      - PORT=3002
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:3002/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
