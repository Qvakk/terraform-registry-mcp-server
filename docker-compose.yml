services:
  terraform-mcp-server:
    build: .
    container_name: terraform-mcp-server
    ports:
      - "3002:3002"
    environment:
      - TRANSPORT_MODE=http
      - PORT=3002
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.create_connection(('localhost', 3002), timeout=5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
